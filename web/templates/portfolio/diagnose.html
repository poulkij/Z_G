{% extends "base.html" %}

{% block title %}持仓诊断 — Z哥量化分析平台{% endblock %}

{% block content %}
<div class="page-header">
    <h1>持仓诊断</h1>
    <p style="color:var(--text-dim);font-size:0.85rem">输入持仓代码，逐股诊断（战法/卖出信号/止损价）</p>
</div>

<div style="background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:1.5rem;max-width:600px;margin-bottom:1.5rem">
    <div class="form-group">
        <label>持仓代码（每行一个）</label>
        <textarea id="holdings-input" rows="5" placeholder="600519.SH&#10;000001.SZ" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.5rem;border-radius:4px;font-family:monospace"></textarea>
    </div>
    <button class="btn" onclick="runDiagnose()">诊断</button>
</div>

<div id="diagnose-result"></div>
{% endblock %}

{% block scripts %}
<script src="/static/js/pages/portfolio.js"></script>
{% endblock %}
