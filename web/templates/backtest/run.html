{% extends "base.html" %}

{% block title %}策略回测 — Z哥量化分析平台{% endblock %}

{% block content %}
<div class="page-header">
    <h1>策略回测</h1>
</div>

<div class="backtest-form" style="background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:1.5rem;max-width:600px">
    <div class="form-group">
        <label>股票代码</label>
        <input type="text" id="bt-ts-code" placeholder="如 600519.SH" value="600519.SH">
    </div>
    <div class="form-group">
        <label>回测天数</label>
        <input type="number" id="bt-days" value="240" min="60" max="1000">
    </div>
    <div style="display:flex;gap:1rem">
        <div class="form-group" style="flex:1">
            <label>止损比例</label>
            <input type="number" id="bt-stop-loss" value="0.07" step="0.01" min="0.01" max="0.50">
        </div>
        <div class="form-group" style="flex:1">
            <label>止盈比例</label>
            <input type="number" id="bt-take-profit" value="0.15" step="0.01" min="0.01" max="1.00">
        </div>
    </div>
    <button class="btn" onclick="runBacktest()">执行回测</button>
    <button class="btn" style="background:var(--border);margin-left:0.5rem" onclick="runTune()">参数调优</button>
</div>

<div id="backtest-result" style="margin-top:1.5rem"></div>

<div id="tune-result" style="margin-top:1.5rem"></div>
{% endblock %}

{% block scripts %}
<script src="/static/js/pages/backtest.js"></script>
{% endblock %}
